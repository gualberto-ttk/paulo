{% extends "base.html" %}

{% block conteudo %}
<h1>Pedidos recentes</h1>
<p class="text-muted">Esses pedidos são apenas exemplos para mostrar a página funcionando.</p>

<table class="table table-hover table-bordered mt-3 align-middle">
    <thead class="table-warning">
        <tr>
            <th>Cliente</th>
            <th>Pedido</th>
            <th>Valor</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        {% for pedido in pedidos %}
        <tr>
            <td>{{ pedido.cliente }}</td>
            <td>{{ pedido.pedido }}</td>
            <td>{{ pedido.valor }}</td>
            <td>{{ pedido.status }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
